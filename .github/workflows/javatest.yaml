name: Run Java Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: mvn test

      - name: Send HTML Report Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smpt.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.MAILUSERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: Automation Test Report

          to: jeyashree0605@gmail.com
          from: Github Actions

          html_body: target/surefire-reports/emailable-report.html